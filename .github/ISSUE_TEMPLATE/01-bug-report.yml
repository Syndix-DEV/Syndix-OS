name: Bug Report
description: Melde einen Fehler oder unerwartetes Verhalten.
title: "[Bug]: "
labels: ["bug", "triage"]
type: bug

body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Bug Report. Bitte fülle die folgenden Felder so genau wie möglich aus.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Vorab geprüft
      options:
        - label: Ich habe geprüft, ob es bereits ein ähnliches Issue gibt.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      description: Welcher Teil ist betroffen?
      options:
        - Syndix OS
        - Syndix Dashboard
        - Syndix API
        - Syndix Shared
        - Dokumentation
        - Unklar / Sonstiges
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Aktuelles Verhalten
      description: Was passiert aktuell?
      placeholder: Beschreibe, was schief läuft.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Erwartetes Verhalten
      description: Was sollte stattdessen passieren?
      placeholder: Beschreibe das gewünschte Verhalten.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Schritte zum Reproduzieren
      description: Wie kann man den Fehler nachstellen?
      placeholder: |
        1. Öffne ...
        2. Klicke auf ...
        3. Siehe Fehler ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Umgebung
      description: Hilft bei der Fehlersuche.
      value: |
        - Betriebssystem:
        - Browser:
        - Node-Version:
        - npm-Version:
        - App-/API-Version:
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevante Logs oder Fehlermeldungen
      description: Bitte keine Tokens, Secrets, Aktivierungsschlüssel oder privaten Daten einfügen.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: Falls hilfreich, füge Screenshots oder kurze Videos hinzu.
    validations:
      required: false

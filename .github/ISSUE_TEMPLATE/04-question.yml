name: Question
description: Stelle eine Frage zur Nutzung, Entwicklung oder Architektur.
title: "[Question]: "
labels: ["question", "triage"]

body:
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Syndix OS
        - Syndix Dashboard
        - Syndix API
        - Syndix Shared
        - Einrichtung / Setup
        - Architektur
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Frage
      description: Was möchtest du wissen?
      placeholder: Beschreibe deine Frage so konkret wie möglich.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Kontext
      description: Was hast du bereits versucht oder geprüft?
      placeholder: |
        Ich habe bereits ...
        Ich erwarte ...
        Unklar ist ...
    validations:
      required: false
